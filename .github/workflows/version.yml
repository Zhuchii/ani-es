name: Auto Version (clean)

on:
  push:
    branches: [ main ]

jobs:
  version:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Stop if commit is from bot
        run: |
          if [[ "$(git log -1 --pretty=%B)" == *"[skip ci]"* ]]; then
            echo "Skipping bot commit"
            exit 0
          fi

      - name: Get last commit message
        id: commit
        run: |
          echo "msg<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Read current version (línea 3)
        id: current
        run: |
          VERSION=$(sed -n '3s/.*"\(.*\)".*/\1/p' ani-es)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump version
        id: bump
        run: |
          VERSION="${{ steps.current.outputs.version }}"
          MSG="${{ steps.commit.outputs.msg }}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          if [[ "$MSG" == *"BREAKING CHANGE"* ]]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [[ "$MSG" == feat:* ]]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          elif [[ "$MSG" == fix:* ]]; then
            PATCH=$((PATCH + 1))
          else
            echo "No version change"
            exit 0
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update version in script
        if: steps.bump.outputs.new_version != ''
        run: |
          VERSION="${{ steps.bump.outputs.new_version }}"
          sed -i '3s/.*/VERSION="'"$VERSION"'"/' ani-es

      - name: Amend commit (sin crear commit nuevo)
        if: steps.bump.outputs.new_version != ''
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add ani-es
          git commit --amend --no-edit --no-verify

      - name: Force push limpio
        if: steps.bump.outputs.new_version != ''
        run: |
          git push --force

      - name: Create tag
        if: steps.bump.outputs.new_version != ''
        run: |
          VERSION=${{ steps.bump.outputs.new_version }}
          git tag -f "v$VERSION"
          git push origin "v$VERSION" --force
